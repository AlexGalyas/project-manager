services:
  postgres:
    image: postgres:16-alpine
    container_name: workforce-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: workforce
      POSTGRES_PASSWORD: workforce
      POSTGRES_DB: workforce
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U workforce -d workforce"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
